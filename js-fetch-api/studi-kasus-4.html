<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Post by User</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            width: 100px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #4338ca;
        }

        #info {
            margin-bottom: 12px;
            font-weight: bold;
            color: #333;
        }

        .kartu {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .kartu span {
            font-size: 12px;
            color: #999;
        }

        .kartu h3 {
            margin: 4px 0 8px;
            color: #4f46e5;
            text-transform: capitalize;
        }

        .kartu p {
            margin: 0;
            color: #555;
        }

        #pesan {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Filter Post by User</h1>
    <div class="input-group">
        <input type="number" id="inputId" placeholder="1–10" min="1" max="10" />
        <button id="btnTampilkan">Tampilkan Post</button>
    </div>
    <p id="pesan"></p>
    <p id="info"></p>
    <div id="daftarPost"></div>



    <script>
        // kerjakan di sini
        const btnTampilkan = document.getElementById("btnTampilkan")
        const pesan = document.getElementById("pesan")
        const info = document.getElementById("info")
        const daftarPost = document.getElementById("daftarPost")

        btnTampilkan.addEventListener("click", async () => {
            pesan.innerHTML = ""
            daftarPost.innerHTML = ""
            info.innerHTML = ""
            try {
                const inputId = Number(document.getElementById("inputId").value)
                if (inputId < 1 || inputId > 10 || isNaN(inputId)) {
                    pesan.textContent = "Masukkan angka 1-10"
                    return

                }
                const response = await fetch("https://jsonplaceholder.typicode.com/posts")
                if (!response.ok) throw new Error("Request Gagal: " + response.status);
                const data = await response.json()
                const cariId = data.filter(c => c.userId === inputId)
                if (cariId.length === 0) {
                    pesan.textContent = "Tidak ada post untuk user ini"
                    return
                }
                cariId.forEach(element => {
                    const p = document.createElement("p")
                    p.classList.add("kartu")
                    p.innerHTML = `
                    <strong>Nomor Post : </strong> ${element.id}<br>
                    <strong>Judul : </strong>${element.title}<br>
                    <strong>Isi : </strong>${element.body}<br>
                    `
                    daftarPost.appendChild(p)
                });
                info.textContent = `Ditemukan ${cariId.length} post dari user ${inputId} `
            } catch (error) {
                pesan.textContent = "Gagal mengambil data : " + error.message
            }
        })
    </script>
</body>

</html>
