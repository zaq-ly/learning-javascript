<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
            background: #1a1a2e;
            color: white;
        }

        .container {
            width: 500px;
        }

        h2 {
            color: #e94560;
            text-align: center;
        }

        .input-box {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #16213e;
            background: #16213e;
            color: white;
            font-size: 15px;
        }

        button {
            padding: 10px 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #16213e;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }

        .task-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-item span {
            flex: 1;
            font-size: 15px;
        }

        .task-item span.selesai {
            text-decoration: line-through;
            color: #555;
        }

        .section-title {
            color: #e94560;
            margin: 20px 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>📋 Task Manager</h2>
        <div class="input-box">
            <input type="text" id="inputTask" placeholder="Tambah task baru...">
            <button id="tombolTambah">Tambah</button>
        </div>
        <div class="section-title">📥 Task dari API</div>
        <div id="listApi"></div>
        <div class="section-title">✍️ Task Saya</div>
        <div id="listSaya"></div>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
