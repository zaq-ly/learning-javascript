<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Daftar Post</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:disabled {
            background: #a5a3a3;
            cursor: not-allowed;
        }

        #daftarPost {
            margin-top: 20px;
        }

        .kartu {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .kartu h3 {
            margin: 0 0 8px;
            color: #4f46e5;
            text-transform: capitalize;
        }

        .kartu p {
            margin: 0;
            color: #555;
        }

        #pesan {
            color: red;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <h1>Daftar Post</h1>
    <button id="btnMuat">Muat Post</button>
    <p id="pesan"></p>
    <div id="daftarPost"></div>


    <script>
        // kerjakan di sini
        const btnMuat = document.getElementById("btnMuat")
        const pesan = document.getElementById("pesan")
        const daftarPost = document.getElementById("daftarPost")

        btnMuat.addEventListener("click", async () => {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/posts")
                if (!response.ok) throw new Error("Request gagal: " + response.status);
                const data = await response.json()
                const totalData = data.slice(0, 10)

                totalData.forEach(element => {
                    const daftar = document.createElement("p")
                    daftar.classList.add("kartu")
                    daftar.innerHTML = `
                    <strong>Judul : </strong> ${element.title} <br>
                    <strong>Isi : </strong> ${element.body}
                    <br><br>
                    `
                    daftarPost.appendChild(daftar)
                });
                btnMuat.disabled = true



            } catch (error) {
                pesan.textContent = "Gagal mengambil data: " + error.message
            }
        })

    </script>
</body>

</html>
