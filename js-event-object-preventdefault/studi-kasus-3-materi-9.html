<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Deteksi Keyboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 1rem;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 6px;
            width: 300px;
            outline: none;
        }

        input:focus {
            border-color: #4f46e5;
        }

        #pesan {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .enter {
            color: #38a169;
        }
    </style>
</head>
<body>

    <p>Tekan tombol apa saja di keyboard:</p>
    <input type="text" id="inputTeks" placeholder="Ketik sesuatu...">
    <p id="pesan"></p>

    <script>
        // kerjakan di sini
        const inputTeks = document.getElementById("inputTeks")
        const pesan = document.getElementById("pesan")

        inputTeks.addEventListener("keydown", (e) =>{
            if(e.key === "Enter"){
                pesan.classList.add("enter")
                pesan.textContent = "Kamu menekan Enter!"
                console.log(pesan.classList)
                
            }else{
                pesan.classList.remove("enter")
                pesan.textContent = `Kamu menekan ${e.key}`
            }
            
        })
        
    </script>

</body>
</html>
