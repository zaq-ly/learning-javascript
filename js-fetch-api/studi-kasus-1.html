<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kartu Profil</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        button {
            padding: 10px;
            border-radius: 10px;
        }

        #hasil {
            padding: 8px;
        }
    </style>
</head>

<body>
    <h1>Aplikasi kartu profile</h1>
    <button id="btnLihatProfil">Tampilkan Profil</button>
    <p id="hasil"></p>
    <script>
        const btnLihat = document.getElementById("btnLihatProfil")
        const hasil = document.getElementById("hasil")

        btnLihat.addEventListener("click", async () => {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users/3")

                console.log(response.ok);     // true
                console.log(response.status); // 200
                console.log(response.url);
                if (!response.ok) {
                    throw new Error("Request gagal: " + response.status);
                }
                const data = await response.json()

                hasil.innerHTML = `
                <p><strong>Nama:</strong> ${data.name}</p>
                <p><strong>Email:</strong> ${data.email}</p>
                <p><strong>Telephone:</strong> ${data.phone}</p>
                <p><strong>Perusahaan:</strong> ${data.company.name}</p>
                `
            } catch (error) {
                hasil.textContent = "Gagal mengambil data: " + error.message
            }
        })

    </script>
</body>

</html>
