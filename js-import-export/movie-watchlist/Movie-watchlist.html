<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Night Planner 🎬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      color: #f5c518;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .search-area {
      display: flex;
      gap: 0.5rem;
      max-width: 600px;
      margin: 0 auto 1.5rem;
    }

    .search-area input {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: none;
      background: #1e1e2e;
      color: #fff;
      font-size: 1rem;
      outline: 2px solid transparent;
      transition: outline 0.2s;
    }

    .search-area input:focus { outline: 2px solid #f5c518; }

    .search-area button {
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: #f5c518;
      color: #0f0f1a;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-area button:hover { opacity: 0.85; }

    #search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto 2rem;
    }

    .result-card {
      background: #1e1e2e;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(245,197,24,0.2);
      border-color: #f5c518;
    }

    .result-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .result-card .card-title {
      padding: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .result-card .card-year {
      padding-bottom: 0.5rem;
      font-size: 0.75rem;
      color: #888;
    }

    .divider {
      max-width: 800px;
      margin: 0 auto 1rem;
      border: none;
      border-top: 1px solid #2a2a3e;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-bar button {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 2px solid #f5c518;
      background: transparent;
      color: #f5c518;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .filter-bar button.active,
    .filter-bar button:hover {
      background: #f5c518;
      color: #0f0f1a;
      font-weight: bold;
    }

    #watchlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .watchlist-card {
      background: #1e1e2e;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      transition: opacity 0.3s;
    }

    .watchlist-card.watched { opacity: 0.5; }

    .watchlist-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .watchlist-card .info {
      padding: 0.75rem;
    }

    .watchlist-card .info h3 {
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .watchlist-card .info span {
      font-size: 0.75rem;
      color: #888;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.75rem 0.75rem;
    }

    .btn-watch {
      flex: 1;
      padding: 0.4rem;
      border-radius: 6px;
      border: none;
      background: #2a9d8f;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }

    .btn-watch:hover { opacity: 0.8; }

    .btn-delete {
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      border: none;
      background: #e63946;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }

    .btn-delete:hover { opacity: 0.8; }

    .watched-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #2a9d8f;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    #status-msg {
      text-align: center;
      color: #f5c518;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }

    .empty-watchlist {
      grid-column: 1 / -1;
      text-align: center;
      color: #555;
      padding: 2rem;
    }
  </style>
</head>
<body>

  <h1>🎬 Movie Night Planner</h1>

  <div class="search-area">
    <input type="text" id="search-input" placeholder="Cari film... (e.g. Avengers)" />
    <button id="search-btn">Cari</button>
  </div>

  <p id="status-msg"></p>
  <div id="search-results"></div>

  <hr class="divider" />

  <div class="filter-bar">
    <button class="active" data-filter="all">Semua</button>
    <button data-filter="unwatched">Belum Ditonton</button>
    <button data-filter="watched">Sudah Ditonton</button>
  </div>

  <div id="watchlist"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
