<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 40px auto;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 6px;
    }

    button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>📝 To-Do List</h2>
  <ul id="list">
    <li>Beli susu <button>Hapus</button></li>
    <li>Cuci baju <button>Hapus</button></li>
    <li>Belajar JS <button>Hapus</button></li>
  </ul>

  <script>
    // Tugasmu di sini
    // 1. Ambil semua tombol Hapus
    // 2. Pasang event listener di setiap tombol
    // 3. Ketika diklik, hapus <li> induknya

    const button = document.querySelectorAll("button")


    button.forEach(element => {
        element.addEventListener("click", (e)=>{
            let tombol = e.target
            let itemnya = tombol.parentElement
            itemnya.remove()
        })
    });

  </script>

</body>
</html>
