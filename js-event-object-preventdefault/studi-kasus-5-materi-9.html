<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>event.type</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 1.5rem;
        }

        #kotak {
            width: 200px;
            height: 200px;
            background: #4f46e5;
            border-radius: 10px;
            cursor: pointer;
        }

        #pesan {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="kotak"></div>
    <p id="pesan">Coba hover atau klik kotak!</p>

    <script>
        // kerjakan di sini
        const kotak = document.querySelector("#kotak")
        const pesan = document.querySelector("#pesan")

        const tampilinPesan = (e) =>{
            pesan.textContent = `Event yang terjadi: ${e.type}`
        }

        kotak.addEventListener("mouseenter", tampilinPesan)
        kotak.addEventListener("mouseleave", tampilinPesan)
        kotak.addEventListener("click", tampilinPesan)



    </script>

</body>
</html>
