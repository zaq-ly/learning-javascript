<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Pengguna</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            width: 100px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #4338ca;
        }

        .kartu {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
        }

        .kartu h3 {
            margin: 0 0 12px;
            color: #4f46e5;
        }

        .kartu p {
            margin: 0 0 6px;
            color: #555;
        }

        #pesan {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Pencari Pengguna</h1>
    <div class="input-group">
        <input type="number" id="inputId" placeholder="1–10" min="1" max="10" />
        <button id="btnCari">Cari</button>
    </div>
    <p id="pesan"></p>
    <div id="hasil"></div>


    <script>
        // kerjakan di sini
        const btnCari = document.getElementById("btnCari")
        const pesan = document.getElementById("pesan")
        const hasil = document.getElementById("hasil")

        btnCari.addEventListener("click", async () => {
            hasil.innerHTML = ""
            pesan.innerHTML = ""
            try {
                const inputId = Number(document.getElementById("inputId").value)
                if (inputId < 1 || inputId > 10 || isNaN(inputId)) {
                    pesan.textContent = "Masukkan angka 1–10"
                    return
                }
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${inputId}`)
                if (!response.ok) throw new Error("Request gagal: " + response.status);
                const data = await response.json()
                hasil.innerHTML = `
                    <p><strong>Name : </strong>${data.name}</p>
                    <p><strong>Email : </strong>${data.email}</p>
                    <p><strong>Kota : </strong>${data.address.city}</p>
                    <p><strong>Website : </strong>${data.website}</p>
                `
            } catch (error) {
                pesan.textContent = "Gagal mengambil data: " + error.message
            }

        })


    </script>
</body>

</html>
